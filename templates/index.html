<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Architect Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xl w-full text-center">
        <div class="mb-12">
            <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Cloud Architect Prep
            </h1>
            <p class="text-slate-400 text-lg">Master the Google Cloud Professional Cloud Architect Certification.</p>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <svg class="w-32 h-32" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            
            <form action="/start_quiz" method="POST" class="space-y-6">
                <div>
                    <label for="num_questions" class="block text-sm font-semibold text-slate-300 mb-2">How many questions for this session?</label>
                    <input type="number" id="num_questions" name="num_questions" value="10" min="1" max="{{ total_questions }}"
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-2xl font-bold focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                    <p class="mt-2 text-xs text-slate-500">{{ total_questions }} questions available in total.</p>
                </div>
                
                <button type="submit" 
                    class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 transform transition hover:-translate-y-1 active:scale-95">
                    Start Quiz Now
                </button>
            </form>
        </div>

        <div class="mt-12 flex justify-center gap-6 text-slate-500 text-sm">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                Interactive
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                Score Tracking
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                Explanations
            </div>
        </div>
    </div>
</body>
</html>
